name: Failover Drill

# Simula a falha do ambiente primário e mede o RTO (tempo até o Route 53
# passar a encaminhar o tráfego para o standby). Disparado manualmente.
on:
  workflow_dispatch:
    inputs:
      failback:
        description: "Recuperar o primário no fim (failback)?"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init -input=false

      - name: Ler outputs
        id: tf
        working-directory: infrastructure
        run: |
          echo "zone_id=$(terraform output -raw dns_zone_id)" >> "$GITHUB_OUTPUT"
          echo "fqdn=$(terraform output -raw dns_record_fqdn)" >> "$GITHUB_OUTPUT"
          echo "primary_id=$(terraform output -raw primary_instance_id)" >> "$GITHUB_OUTPUT"
          echo "standby_ip=$(terraform output -raw standby_ec2_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Executar drill e medir RTO
        run: |
          ZONE="${{ steps.tf.outputs.zone_id }}"
          FQDN="${{ steps.tf.outputs.fqdn }}"
          PRIMARY_ID="${{ steps.tf.outputs.primary_id }}"
          STANDBY_IP="${{ steps.tf.outputs.standby_ip }}"

          echo "Resposta DNS inicial:"
          aws route53 test-dns-answer --hosted-zone-id "$ZONE" \
            --record-name "$FQDN" --record-type A --query 'RecordData' --output text || true

          echo "== A simular falha do primário (stop da EC2 $PRIMARY_ID) =="
          START=$(date +%s)
          aws ec2 stop-instances --instance-ids "$PRIMARY_ID" >/dev/null

          echo "== A aguardar o Route 53 encaminhar para o standby ($STANDBY_IP) =="
          RTO="(não detetado)"
          for i in $(seq 1 60); do
            ANS=$(aws route53 test-dns-answer --hosted-zone-id "$ZONE" \
              --record-name "$FQDN" --record-type A --query 'RecordData' --output text || true)
            echo "  t+$((i*5))s -> $ANS"
            if echo "$ANS" | grep -q "$STANDBY_IP"; then
              END=$(date +%s); RTO="$((END-START))s"; break
            fi
            sleep 5
          done

          echo "## Resultado do Failover Drill" >> "$GITHUB_STEP_SUMMARY"
          echo "- **RTO medido:** $RTO" >> "$GITHUB_STEP_SUMMARY"
          echo "- O Route 53 passou a responder com o IP do standby sem intervenção manual." >> "$GITHUB_STEP_SUMMARY"

      - name: Failback (recuperar primário)
        if: ${{ inputs.failback }}
        run: |
          aws ec2 start-instances --instance-ids "${{ steps.tf.outputs.primary_id }}" >/dev/null
          echo "Primário a reiniciar; o Global Accelerator voltará a encaminhar para ele quando ficar healthy."
