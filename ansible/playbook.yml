---
# Configura a EC2 e arranca os containers da aplicação.
# Variáveis injetadas pelo workflow via --extra-vars:
#   image_base, image_tag, sqs_queue_url, aws_region, app_port,
#   ghcr_user, ghcr_token, ssm_param_name, db_username, rds_endpoint, db_name
#
# NOTA: a password da BD NUNCA passa pelo pipeline — é a própria EC2 que a lê
# do SSM Parameter Store usando o seu IAM Instance Profile (igual ao standby).
- name: Deploy da aplicação na EC2
  hosts: web
  become: true

  tasks:
    - name: Instalar Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Arrancar e ativar o Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Login no GitHub Container Registry
      ansible.builtin.command:
        cmd: "docker login ghcr.io -u {{ ghcr_user }} --password-stdin"
        stdin: "{{ ghcr_token }}"
      no_log: true

    - name: Pull da imagem do API Service
      ansible.builtin.command:
        cmd: "docker pull {{ image_base }}/api-service:{{ image_tag }}"

    - name: Pull da imagem do Worker Service
      ansible.builtin.command:
        cmd: "docker pull {{ image_base }}/worker-service:{{ image_tag }}"

    - name: Remover containers antigos (se existirem)
      ansible.builtin.command:
        cmd: "docker rm -f {{ item }}"
      loop:
        - api-service
        - worker-service
      failed_when: false

    # A password vem do SSM Parameter Store (SecureString), obtida pela própria
    # EC2 com as credenciais temporárias do Instance Profile.
    - name: Obter a password da BD do SSM Parameter Store
      ansible.builtin.command:
        cmd: >-
          aws ssm get-parameter --name {{ ssm_param_name }}
          --with-decryption --region {{ aws_region }}
          --query Parameter.Value --output text
      register: db_password_ssm
      changed_when: false
      no_log: true

    - name: Construir o DATABASE_URL
      ansible.builtin.set_fact:
        database_url: "postgresql+psycopg2://{{ db_username }}:{{ db_password_ssm.stdout | trim }}@{{ rds_endpoint }}/{{ db_name }}"
      no_log: true

    - name: Arrancar o API Service
      ansible.builtin.command:
        cmd: >-
          docker run -d --name api-service --restart unless-stopped
          -p {{ app_port }}:8000
          -e DATABASE_URL={{ database_url }}
          -e SQS_QUEUE_URL={{ sqs_queue_url }}
          -e AWS_REGION={{ aws_region }}
          {{ image_base }}/api-service:{{ image_tag }}
      no_log: true

    - name: Arrancar o Worker Service
      ansible.builtin.command:
        cmd: >-
          docker run -d --name worker-service --restart unless-stopped
          -e DATABASE_URL={{ database_url }}
          -e SQS_QUEUE_URL={{ sqs_queue_url }}
          -e AWS_REGION={{ aws_region }}
          {{ image_base }}/worker-service:{{ image_tag }}
      no_log: true
