<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Fundo branco (legivel em tema claro e escuro do GitHub) -->
  <rect x="0" y="0" width="980" height="700" fill="#ffffff"/>

  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Sistema de Inscrições em Eventos — Arquitetura AWS</text>

  <!-- Cliente -->
  <rect x="30" y="250" width="110" height="60" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="85" y="285" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Cliente</text>

  <!-- VPC -->
  <rect x="190" y="80" width="560" height="470" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="205" y="102" font-size="13" font-weight="700" fill="#1d4ed8">VPC 10.0.0.0/16 (2 Availability Zones)</text>

  <!-- Subnet publica -->
  <rect x="212" y="118" width="516" height="185" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="228" y="138" font-size="12" font-weight="600" fill="#475569">Subnet pública</text>

  <!-- EC2 -->
  <rect x="234" y="150" width="472" height="140" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
  <text x="250" y="170" font-size="12.5" font-weight="700" fill="#c2410c">EC2 t3.micro · IAM Instance Profile (SQS scoped)</text>

  <!-- Container API -->
  <rect x="252" y="185" width="200" height="90" rx="6" fill="#ffedd5" stroke="#c2410c" stroke-width="1.4"/>
  <text x="352" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">API Service</text>
  <text x="352" y="242" text-anchor="middle" font-size="11.5" fill="#7c2d12">FastAPI · porta 8000</text>

  <!-- Container Worker -->
  <rect x="488" y="185" width="200" height="90" rx="6" fill="#ffedd5" stroke="#c2410c" stroke-width="1.4"/>
  <text x="588" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">Worker Service</text>
  <text x="588" y="242" text-anchor="middle" font-size="11.5" fill="#7c2d12">consumidor SQS</text>

  <!-- Subnet privada -->
  <rect x="212" y="330" width="516" height="200" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="228" y="350" font-size="12" font-weight="600" fill="#475569">Subnet privada (sem acesso público)</text>

  <!-- RDS -->
  <rect x="360" y="380" width="220" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
  <text x="470" y="415" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Amazon RDS</text>
  <text x="470" y="435" text-anchor="middle" font-size="11.5" fill="#166534">PostgreSQL · encriptado</text>

  <!-- SQS (fora da VPC, servico gerido) -->
  <rect x="800" y="150" width="160" height="66" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="880" y="178" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5b21b6">Amazon SQS</text>
  <text x="880" y="197" text-anchor="middle" font-size="11" fill="#5b21b6">event-queue</text>

  <rect x="800" y="256" width="160" height="60" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="880" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Dead Letter Queue</text>
  <text x="880" y="299" text-anchor="middle" font-size="10.5" fill="#5b21b6">após 3 falhas</text>

  <!-- Fluxos -->
  <!-- Cliente -> API -->
  <line x1="140" y1="270" x2="250" y2="230" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="150" y="238" font-size="11" font-weight="600" fill="#334155">HTTP</text>

  <!-- API -> SQS (publica) -->
  <path d="M452,205 C620,150 700,165 798,178" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="600" y="150" font-size="11" font-weight="600" fill="#334155">publica mensagem</text>

  <!-- SQS -> Worker (consome) -->
  <path d="M800,200 C740,230 680,225 640,222" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="690" y="245" font-size="11" font-weight="600" fill="#334155">consome</text>

  <!-- API -> RDS (grava) -->
  <line x1="352" y1="275" x2="430" y2="378" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="300" y="345" font-size="11" font-weight="600" fill="#334155">grava PENDING</text>

  <!-- Worker -> RDS (atualiza) -->
  <line x1="588" y1="275" x2="510" y2="378" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="560" y="345" font-size="11" font-weight="600" fill="#334155">atualiza estado</text>

  <!-- SQS -> DLQ -->
  <line x1="880" y1="216" x2="880" y2="254" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ===================== CI/CD ===================== -->
  <line x1="40" y1="590" x2="940" y2="590" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="615" font-size="13" font-weight="700" fill="#0f172a">Pipeline CI/CD (GitHub Actions · OIDC)</text>

  <rect x="40" y="628" width="150" height="52" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="1.3"/>
  <text x="115" y="650" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">git push → main</text>
  <text x="115" y="667" text-anchor="middle" font-size="10.5" fill="#475569">(ou Pull Request)</text>

  <rect x="235" y="628" width="180" height="52" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="325" y="650" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Build + Push imagens</text>
  <text x="325" y="667" text-anchor="middle" font-size="10.5" fill="#1d4ed8">GHCR · tag = commit SHA</text>

  <rect x="460" y="628" width="180" height="52" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.3"/>
  <text x="550" y="650" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Terraform apply</text>
  <text x="550" y="667" text-anchor="middle" font-size="10.5" fill="#5b21b6">VPC · EC2 · RDS · SQS · IAM</text>

  <rect x="685" y="628" width="180" height="52" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.3"/>
  <text x="775" y="650" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">Ansible → EC2</text>
  <text x="775" y="667" text-anchor="middle" font-size="10.5" fill="#c2410c">pull + run containers</text>

  <line x1="190" y1="654" x2="233" y2="654" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="415" y1="654" x2="458" y2="654" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="640" y1="654" x2="683" y2="654" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
</svg>
